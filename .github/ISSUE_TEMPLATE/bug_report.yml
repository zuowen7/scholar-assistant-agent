name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: "Description"
      description: "What happened? What did you expect to happen?"
    validations:
      required: true
  - type: textarea
    attributes:
      label: "Steps to reproduce"
      description: "List the exact steps to trigger the bug"
      placeholder: |
        1. Open the app
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: input
    attributes:
      label: "Version"
      description: "Which version are you using? (check Settings → About)"
      placeholder: "v0.3.2"
  - type: dropdown
    attributes:
      label: "Platform"
      options: ["Windows 11", "Windows 10", "macOS", "Linux"]
