name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r python/requirements-lock.txt
          pip install pytest pytest-asyncio hypothesis

      - name: Run pytest (full suite)
        run: cd python && pytest tests/ -q --tb=short

      - name: Run test quality gate (edge/fault/property/stress)
        run: cd python && python scripts/ci_test_quality.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Run vitest
        run: npx vitest run

      - name: TypeScript type check
        run: npx vue-tsc --noEmit

  build-windows:
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log -20 --pretty=format:"- %s (%h)" --no-merges)
          fi
          # Multiline to GITHUB_OUTPUT
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r python/requirements-lock.txt
          pip install pyinstaller

      - name: Install frontend dependencies
        run: npm install

      - name: Ensure build directories exist
        shell: bash
        run: |
          mkdir -p python/data/paper_assets
          mkdir -p python/plugins
          mkdir -p scripts/.tools-cache

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "研墨 ${{ github.ref_name }}"
          releaseBody: |
            ## Changes

            ${{ steps.changelog.outputs.body }}

            ## Installation

            | Platform | File |
            |----------|------|
            | Windows  | `研墨_x64-setup.exe` |

            > [!NOTE]
            > For local AI features, install [Ollama](https://ollama.com) and pull a model:
            > ```
            > ollama pull qwen3:8b
            > ```
          releaseDraft: true
          prerelease: false
