name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r python/requirements-lock.txt pytest pytest-asyncio

      - name: Run pytest
        run: cd python && pytest tests/ -q --tb=short

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Run vitest
        run: npx vitest run

      - name: TypeScript type check
        run: npx vue-tsc --noEmit

  build-windows:
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r python/requirements-lock.txt
          pip install pyinstaller

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.5.11
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Scholar Assistant ${{ github.ref_name }}"
          releaseBody: |
            ## What's New

            ### Voice Assistant
            - **Wake word** "小研" — say it to activate, with homophone variant matching (小研/小严/小言 all work)
            - **Global hotkey** `Alt+Shift+V` — system-wide, works even when minimized (desktop app only)
            - **Siri-style voice UI** — fullscreen glass-morphism with pulsing orb, ripple rings, live transcript
            - **Voice dictation** — mic buttons in editor toolbar, Agent panel, and AI panel
            - **Voice settings panel** — custom wake word, hotkey, sensitivity, language (Settings → Voice)
            - **Three-layer dedup** — eliminates Chrome re-recognition duplication automatically

            ### Fixed
            - Voice input duplication (Monaco Range fallback, speech echo dedup, smart punctuation merge)
            - Wake word / dictation conflict prevention (sync SR pause/resume)
            - Bilingual UI: UiDropdown race condition, vue-i18n @ parsing crash

            | Platform | File |
            |----------|------|
            | Windows | `Scholar Assistant_x64-setup.exe` |

            ### Prerequisites
            Install [Ollama](https://ollama.com) and pull a model:
            ```bash
            ollama pull qwen3:8b
            ```
          releaseDraft: true
          prerelease: false
