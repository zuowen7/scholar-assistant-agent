name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for hardcoded API keys / secrets
        shell: bash
        run: |
          # Block releases that accidentally contain real secrets in config/data files.
          # Only scans YAML/JSON/TOML (not .py/.ts where 'token' is a common variable).
          FAIL=0
          # 1) api_key / secret with non-empty value in YAML/TOML
          if git grep -nE '(api_key|secret_key|private_key)\s*:\s*["\x27]?[A-Za-z0-9+/=_.-]{12,}' \
              -- '*.yaml' '*.yml' '*.toml' \
              ':!*.local.yaml' ':!*.local.yml' ':!config/providers.yaml' \
              2>/dev/null | grep -viE '(example|placeholder|dummy|your[_-]?key|<your|xxx|"")' \
              | grep -q .; then
              echo "::error::Hardcoded API key detected in config files"
              git grep -nE '(api_key|secret_key|private_key)\s*:\s*["\x27]?[A-Za-z0-9+/=_.-]{12,}' \
                  -- '*.yaml' '*.yml' '*.toml' ':!*.local.yaml' ':!*.local.yml' ':!config/providers.yaml' \
                  | grep -viE '(example|placeholder|dummy|your[_-]?key|<your|xxx|"")'
              FAIL=1
          fi
          # 2) sk-* patterns (OpenAI/Anthropic keys) in all text files
          if git grep -nE '\bsk-[a-zA-Z0-9]{20,}\b' \
              -- '*.yaml' '*.yml' '*.py' '*.ts' '*.vue' '*.json' '*.toml' '*.env' \
              ':!*.local.yaml' ':!*.local.yml' ':!config/providers.yaml' \
              2>/dev/null | grep -viE '(sk-test|sk-mock|sk-placeholder|sk-example|sk-your)' \
              | grep -q .; then
              echo "::error::sk-* API key pattern detected"
              git grep -nE '\bsk-[a-zA-Z0-9]{20,}\b' \
                  -- '*.yaml' '*.yml' '*.py' '*.ts' '*.vue' '*.json' '*.toml' '*.env' ':!*.local.yaml' \
                  | grep -viE '(sk-test|sk-mock|sk-placeholder|sk-example|sk-your)'
              FAIL=1
          fi
          exit $FAIL

  test:
    needs: secret-scan
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r python/requirements-lock.txt
          pip install pytest pytest-asyncio hypothesis

      - name: Run pytest (full suite)
        run: cd python && pytest tests/ -q --tb=short

      - name: Run test quality gate (edge/fault/property/stress)
        run: cd python && python scripts/ci_test_quality.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Run vitest
        run: npx vitest run

      - name: TypeScript type check
        run: npx vue-tsc --noEmit

  build-windows:
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log -20 --pretty=format:"- %s (%h)" --no-merges)
          fi
          # Multiline to GITHUB_OUTPUT
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r python/requirements-lock.txt
          pip install pyinstaller

      - name: Install frontend dependencies
        run: npm install

      - name: Ensure build directories exist
        shell: bash
        run: |
          mkdir -p python/data/paper_assets
          mkdir -p python/plugins
          mkdir -p scripts/.tools-cache

      - name: Scrub runtime data before build
        shell: bash
        run: |
          # Remove any user/runtime data that may have been committed accidentally
          # or left over from test runs. Only asset/template dirs should remain.
          rm -rf python/data/argument_graphs
          rm -rf python/data/argument_output
          rm -rf python/data/companion
          rm -rf python/data/assets
          rm -rf python/data/chromadb
          rm -rf python/data/input
          rm -rf python/data/output
          rm -rf python/data/agent
          rm -f python/data/projects.json
          rm -rf python/data/generated_tools
          rm -rf src-tauri/data

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "研墨 ${{ github.ref_name }}"
          releaseBody: |
            ## Changes

            ${{ steps.changelog.outputs.body }}

            ## Installation

            | Platform | File |
            |----------|------|
            | Windows  | `研墨_x64-setup.exe` |

            > [!NOTE]
            > For local AI features, install [Ollama](https://ollama.com) and pull a model:
            > ```
            > ollama pull qwen3:8b
            > ```
          releaseDraft: true
          prerelease: false
