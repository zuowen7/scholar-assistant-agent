agent:
  api_key: ''
  base_url: ''
  model: ''
  model_aliases:
    4o: gpt-4o
    4o-mini: gpt-4o-mini
    deepseek: deepseek-chat
    ds: deepseek-chat
    ds-r1: deepseek-reasoner
    haiku: claude-haiku-4-5
    opus: claude-opus-4-6
    sonnet: claude-sonnet-4-6
  proxy: ''
  provider: auto
chunker:
  max_tokens: 800
  overlap_tokens: 0
  strategy: sentence
features:
  argument_companion: true
  argument_map_v2: true
  parallel_review: true
translator:
  cloud:
    api_key: ''
    base_url: https://api.deepseek.com/v1
    max_tokens: 16384
    model: deepseek-v4-pro
    provider: deepseek
  engine: cloud
  model: qwen3:8b
  parallel:
    max_concurrency: 1
    retry_delay: 2.0
  system_prompt: 'You are a professional academic translator. Translate the following
    English text to Chinese.

    Rules:

    1. Preserve all technical terms, formulas, and citations exactly as-is.

    2. Keep the original paragraph structure (use blank lines between paragraphs exactly
    as in the source).

    3. Use natural, fluent Chinese suitable for academic contexts.

    4. Translate sentence by sentence, do not skip or summarize any content.

    '
vision:
  api_key: ''
  base_url: https://api.openai.com/v1
  model: gpt-4o
zotero:
  api_key: ''
  style: ieee
  user_id: ''
