[pytest]
asyncio_mode = auto
testpaths = tests
addopts = -v --tb=short
markers =
    integration: integration tests that may need optional services or heavier local dependencies
    ollama: tests that require a running Ollama instance with a qwen model
    edge: edge case tests (malformed input, boundary values, stress)
    fault: fault injection tests (DB failure, network failure, resource exhaustion)
    property: property-based tests (Hypothesis — random input invariants)
    slow: tests that take > 5 seconds
