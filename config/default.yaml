# Scholar Assistant 默认配置

# PDF 解析
parser:
  # pdfplumber 或 pymupdf
  engine: pdfplumber
  # 是否保留表格
  extract_tables: false

# 文本清洗
cleaner:
  # 合并断行的最大行间距 (pt)
  max_line_gap: 5.0
  # 连字符断词处理
  fix_hyphenation: true
  # 移除页眉页脚
  remove_headers_footers: true

# 文本切块
chunker:
  # 每块最大 token 数 (面向 Qwen3, block-aware 模式下缩小以提升对齐率)
  max_tokens: 800
  # block-aware 模式下必须为 0，否则同一 block 会被重复翻译
  overlap_tokens: 0
  # 切块策略: sentence | paragraph | fixed
  strategy: sentence

# 翻译引擎
translator:
  # Ollama 配置
  ollama_base_url: "http://localhost:11434"
  model: "qwen3:8b"
  # 生成参数
  temperature: 0.3
  # 最大并发翻译块数（建议 2-4，Ollama 单实例 4 较稳）
  max_concurrency: 4
  parallel:
    max_concurrency: 3
  num_predict: 4096
  # 翻译提示词模板
  system_prompt: |
    You are a professional academic translator. Translate the following English text to Chinese.
    Rules:
    1. Preserve all technical terms, formulas, and citations exactly as-is.
    2. Keep the original paragraph structure.
    3. Use natural, fluent Chinese suitable for academic contexts.

# 输出格式
formatter:
  # 输出格式: bilingual | translated_only
  output_format: bilingual
  # 输出文件格式: txt | markdown | docx
  file_format: markdown

# Zotero 文献管理 (可选)
# 在 https://www.zotero.org/settings/keys 创建 API Key
zotero:
  api_key: ""
  user_id: ""
  style: "ieee"

# Vision 图像分析 (可选)
# 需要支持 vision 的模型，如 GPT-4o、Qwen-VL 等
vision:
  base_url: "https://api.openai.com/v1"
  api_key: ""
  model: "gpt-4o"

# Translate pipeline limits
translate:
  # 最多同时保留的历史任务数（超出自动清理）
  max_tasks: 10
  # 上传文件最大字节数（默认 200MB）
  max_upload_mb: 200
  # PDF 最大页数（超出拒绝解析防 OOM）
  max_pdf_pages: 500

# Feature flags
features:
  # Toulmin 论证图 v2（重写中）。false = 旧缩进树模式；true = 新 Vue Flow 图模式
  argument_map_v2: true
  # 论证陪练 v3（进行中 — 见 docs/argument-map-v3-spec.md）。论证账本 + Reviewer‑2 对抗。
  # 暗发布：默认 false，Phase 4 完成后翻 true。
  argument_companion: true
