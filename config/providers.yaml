# Cloud LLM provider presets for Scholar Assistant.
# Loaded by python/src/translator/cloud_client.py at module import time.

openai:
  name: OpenAI
  base_url: "https://api.openai.com/v1"
  models:
    - gpt-4o
    - gpt-4o-mini
    - gpt-4-turbo
    - o3-mini
  api_format: openai

anthropic:
  name: Anthropic Claude
  base_url: "https://api.anthropic.com"
  models:
    - claude-sonnet-4-20250514
    - claude-haiku-4-20250414
  api_format: anthropic

deepseek:
  name: DeepSeek
  base_url: "https://api.deepseek.com/v1"
  models:
    - deepseek-v4-pro
    - deepseek-v4-flash
    - deepseek-chat
    - deepseek-reasoner
  api_format: openai

moonshot:
  name: Moonshot / Kimi
  base_url: "https://api.moonshot.cn/v1"
  models:
    - moonshot-v1-8k
    - moonshot-v1-32k
    - moonshot-v1-128k
  api_format: openai

zhipu:
  name: "智谱 ChatGLM"
  base_url: "https://open.bigmodel.cn/api/paas/v4"
  models:
    - glm-4-plus
    - glm-4-flash
    - glm-4-long
  api_format: openai

qwen:
  name: "通义千问"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  models:
    - qwen-plus
    - qwen-turbo
    - qwen-max
  api_format: openai

gemini:
  name: Google Gemini
  base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
  models:
    - gemini-2.0-flash
    - gemini-2.5-pro-preview-06-05
  api_format: openai

siliconflow:
  name: "SiliconFlow 硅基流动"
  base_url: "https://api.siliconflow.cn/v1"
  models:
    - Qwen/Qwen3-235B-A22B
    - deepseek-ai/DeepSeek-V3
  api_format: openai

